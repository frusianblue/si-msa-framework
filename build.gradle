plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6' apply false
    id 'io.spring.dependency-management' version '1.1.7'
    // ===== SI 소스 취약점 점검 =====
    id 'org.owasp.dependencycheck' version '12.1.0'   // 의존성 알려진 취약점(CVE) 스캔
    id 'org.sonarqube' version '6.0.1.5171'           // 정적분석(코드 품질/보안 핫스팟)
}

allprojects {
    group = 'com.company'
    version = '1.0.0'
    repositories { mavenCentral() }
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'io.spring.dependency-management'

    java {
        toolchain { languageVersion = JavaLanguageVersion.of(21) }
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        }
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
        options.compilerArgs.add('-parameters')
        // 컴파일 경고 표시 (시큐어코딩: deprecated/unchecked 사용 가시화)
        options.compilerArgs.add('-Xlint:all,-processing')
    }
    tasks.withType(Test) { useJUnitPlatform() }
}

// ===== OWASP Dependency-Check 설정 =====
// 실행: ./gradlew dependencyCheckAggregate  (리포트: build/reports/dependency-check-report.html)
dependencyCheck {
    formats = ['HTML', 'JSON']
    // CVSS 7.0 이상(High/Critical) 발견 시 빌드 실패 → CI 게이트로 활용
    failBuildOnCVSS = 7.0f
    suppressionFile = 'config/dependency-check-suppressions.xml'
    analyzers { assemblyEnabled = false }
}

// ===== SonarQube 설정 =====
// 실행: ./gradlew sonar -Dsonar.host.url=... -Dsonar.token=...
sonar {
    properties {
        property 'sonar.projectKey', 'si-msa-framework'
        property 'sonar.projectName', 'SI MSA Framework'
        property 'sonar.sourceEncoding', 'UTF-8'
        property 'sonar.java.source', '21'
    }
}
