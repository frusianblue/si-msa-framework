# =====================================================================
# auth-types / 공통 설정 (모든 트랙 공유) — 인증 "방식"만 트랙 프로파일에서 바꾼다.
#   실행: ./gradlew bootRun --args='--spring.profiles.active=t1-form-session'
# =====================================================================
server:
  port: 8080

spring:
  application:
    name: auth-types
  # 기본 프로파일 없음 — 반드시 트랙을 골라 띄운다(t1-form-session 등).
  threads:
    virtual:
      enabled: true

  # DB 없음 — 보안-영속 결합 분리 이후 framework-security 가 mybatis/spring-jdbc 를 전이로 끌어오지 않는다.
  #   인증기는 인메모리(BCrypt)이고 dynamic-authorization=false 라 RBAC DB 조회가 없으므로
  #   DataSourceAutoConfiguration 이 활성화되지 않는다(H2/datasource 설정 불필요).
  flyway:
    enabled: false

framework:
  security:
    # 데모: rbac DB 동적 인가를 끄고 "인증만 되면 통과"로 둔다(rbac 테이블 불필요).
    dynamic-authorization: false
    menu: false
    jwt:
      # 세션 모드에서도 JwtProvider 빈은 생성된다 → 32바이트 이상 시크릿 필요(로컬 데모용 고정값).
      secret: auth-types-demo-secret-key-please-change-in-real-services-32+
      access-token-validity-seconds: 1800
      refresh-token-validity-seconds: 1209600
    token-store:
      type: memory

management:
  endpoints:
    web:
      exposure:
        include: health,info
