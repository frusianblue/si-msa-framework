# =====================================================================================
# batch-types — 배치 "처리 방식(유형)" + DB 리더/라이터 종류 카탈로그 설정
#   BATCH_JOB_NAME 으로 잡 하나를 골라 1회 실행.
#     처리 방식: multiThreadedChunkJob | partitionedJob | flowControlJob | compositeProcessorJob
#     DB 연동:   mybatisJob | storedProcedureJob
# =====================================================================================
spring:
  application:
    name: batch-types

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app}
    driver-class-name: org.postgresql.Driver

  # 스키마는 Flyway 소유(TASK_*/BATCH_*/도메인/함수). 자동 DDL 은 모두 끈다.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  batch:
    job:
      name: ${BATCH_JOB_NAME:multiThreadedChunkJob}
    jdbc:
      initialize-schema: never # BATCH_* 는 Flyway(V2)가 만든다.

  cloud:
    task:
      initialize-enabled: false # TASK_* 는 Flyway(V1)가 만든다.
      single-instance-enabled: true # 같은 태스크 동시 1개만.
      batch:
        fail-on-job-failure: true # 배치 실패 → 종료코드 ≠0 (CronJob 실패감지).

framework:
  task:
    enabled: true # 감사 로깅 리스너 등록(실행 이력은 @EnableFrameworkTask).

logging:
  level:
    com.example.batchtypes: INFO
    com.company.framework.task: INFO
    org.springframework.batch: INFO
    org.springframework.cloud.task: INFO
