# deploy/k8s/components/postgres-persistent/postgres.yaml
# 영속 인-클러스터 PostgreSQL — "현재 환경에서 운영 리허설"용 stateful DB.
#   overlays/local/postgres.yaml(emptyDir, throwaway)의 영속 버전.
#   - StatefulSet + volumeClaimTemplates → 기본 StorageClass(kind=local-path / Docker Desktop=hostpath)가
#     PVC 를 동적 프로비저닝. storageClassName 미지정 = 클러스터 기본 SC 사용(요청대로).
#   - 단일 인스턴스(replicas:1, RWO). local-path/hostpath 는 RWO 전용이라 단일 인스턴스에 적합.
#   - Service 이름 'postgres'(headless) → base 의 DB_URL(jdbc:postgresql://postgres:5432/...) 그대로 풀림.
#   - initdb 는 최초 1회(빈 데이터 디렉토리). PVC 라 파드 재생성/재스케줄에도 데이터 유지.
#   ⚠️ 실 운영은 외부 매니지드 DB(RDS/CloudSQL) 권장 — 이건 "로컬에서 운영 토폴로지 리허설"용.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  labels:
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: database
data:
  init.sql: |
    CREATE ROLE auth_app  WITH LOGIN PASSWORD 'dev-authpass';
    CREATE ROLE user_app  WITH LOGIN PASSWORD 'dev-userpass';
    CREATE ROLE admin_app WITH LOGIN PASSWORD 'dev-adminpass';
    CREATE DATABASE authdb  OWNER auth_app;
    CREATE DATABASE userdb  OWNER user_app;
    CREATE DATABASE admindb OWNER admin_app;
    \connect authdb
    GRANT ALL ON SCHEMA public TO auth_app;
    \connect userdb
    GRANT ALL ON SCHEMA public TO user_app;
    \connect admindb
    GRANT ALL ON SCHEMA public TO admin_app;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: database
spec:
  serviceName: postgres          # headless Service 와 동일 이름(안정적 네트워크 ID)
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: si-msa
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70            # postgres:16-alpine 의 postgres 사용자(uid 70)
        fsGroup: 70              # PVC 마운트를 postgres 그룹이 쓸 수 있게
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER,     value: "postgres" }
            - { name: POSTGRES_PASSWORD, value: "postgres" }   # 부트스트랩 superuser(리허설). 운영은 Secret 주입.
            - { name: POSTGRES_DB,       value: "postgres" }
            - { name: PGDATA,            value: "/var/lib/postgresql/data/pgdata" }
          ports:
            - { name: postgres, containerPort: 5432 }
          volumeMounts:
            - { name: data,   mountPath: /var/lib/postgresql/data }
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem 은 미설정 — postgres 가 /var/run, /tmp 에 써야 함(PVC 외 경로).
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: si-msa
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName 생략 = 클러스터 기본 SC(동적 프로비저닝). 운영 CSI 로 바꾸려면 여기에 명시.
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres                 # ClusterIP — DB_URL(jdbc:postgresql://postgres:5432/...) 해소.
  labels:                        #   단일 인스턴스라 headless 불요. 기존 local overlay Service(ClusterIP)와 동일 형태 →
    app.kubernetes.io/name: postgres   #   재apply 시 clusterIP 불변 충돌 없음("unchanged").
    app.kubernetes.io/part-of: si-msa
spec:
  selector:
    app.kubernetes.io/name: postgres   # StatefulSet 파드 라벨과 일치 → postgres-0 으로 라우팅
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
---
# 앱(component=service)에서만 5432 수신 허용 — default-deny-ingress(base) 보완.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-apps
  labels: { app.kubernetes.io/part-of: si-msa }
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/component: service }
      ports:
        - { protocol: TCP, port: 5432 }
