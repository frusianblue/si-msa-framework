apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: si-msa
  labels: { app: user-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
    spec:
      containers:
        - name: user-service
          image: registry.example.com/si-msa/user-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: user-service-config }
            - secretRef: { name: user-service-secret }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          # Spring Boot Actuator 프로브 (management.endpoint.health.probes.enabled=true)
          startupProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: si-msa
spec:
  selector: { app: user-service }
  ports:
    - port: 8080
      targetPort: 8080
