# deploy/k8s/prod-kind/kind-svc-config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# prod GitOps 리허설 — 서비스(svc) 클러스터. stateless 4앱(gateway·auth-server·user/admin-service)이 여기 산다.
#   = 실 prod 의 "서비스 클러스터" 역할. DB/Redis 는 K8s 밖(우분투 도커 컨테이너, --network kind).
#
# 호스트 포트 분배(§3-1): svc = 호스트 8080/8443 (cicd 가 80/443 을 쓰므로 충돌 회피).
#   → 서비스 ingress 는 http://<svc-host>:8080. (지금 ingress 안 깔아도 매핑은 생성 시 박아둠 = 나중 재생성 회피.)
#
# cicd-config 와 동일하게 ① containerdConfigPatches ② ingress-ready ③ extraPortMappings ④ extraMounts 없음.
#   노드 containerd 는 Harbor(cicd 에 있음)를 신뢰해야 함 → registry-trust DaemonSet 멀티클러스터판(03-cross-trust.sh)이
#   harbor.local 을 kind-cicd CP 노드 IP 로 가리키게 채운다(같은 `kind` 도커망이라 컨테이너 IP 로 도달).
#
# ⚠️ extraPortMappings 고정 · 호스트 8080/8443 이 비어 있어야 함.
# 노드: control-plane + worker x1.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: svc
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
