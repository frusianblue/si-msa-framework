# deploy/k8s/prod-kind/kind-cicd-config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# prod GitOps 리허설 — hub(cicd) 클러스터. Harbor · Jenkins · ArgoCD 가 여기 산다.
#
# 호스트 포트 분배(NEXT_PROD_GITOPS_ARGOCD §3-1 확정):
#   cicd = 호스트 80/443 (브라우저가 보는 hub UI: harbor.local / jenkins.local / argocd.local)
#   svc  = 호스트 8080/8443 (kind-svc-config.yaml) — 두 클러스터가 80/443 을 동시에 못 잡으므로 분리.
#
# standalone-kind/kind-config.yaml(단일 sanity)과 동일 원리:
#   ① containerdConfigPatches(config_path) — 노드 certs.d 활성화 전제(registry-trust DaemonSet 이 채움).
#   ② control-plane node-labels: ingress-ready=true — ingress-nginx 컨트롤러를 CP 에 고정(kind 매니페스트 nodeSelector).
#   ③ control-plane extraPortMappings 80→80 / 443→443 — ingress hostPort 를 호스트로 게시(port-forward 졸업).
#   ④ extraMounts 없음 — certs.d 는 DaemonSet 이 부팅마다 재기입(재부팅 내성, §8 함정 해결판).
#
# ⚠️ extraPortMappings 는 `kind create` 시점 고정 → 포트 바꾸려면 클러스터 재생성 필요.
# ⚠️ 호스트 80/443 이 비어 있어야 함(점유 시 hostPort 를 낮추고 hosts 도 그 포트로).
# 노드: control-plane + worker x1 (리허설 경량; 단일 sanity 의 3노드보다 가볍게).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cicd
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
