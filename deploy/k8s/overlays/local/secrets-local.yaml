# deploy/k8s/overlays/local/secrets-local.yaml
# ⚠️ 로컬 전용 시크릿. dev 의 placeholder 와 달리 'change-me'/'dev-only' 같은 토큰이 없고 길이도 충분해
#    prod 프로파일의 AesMasterKeySafetyGuard(약한 키/placeholder 부팅 차단)를 통과한다.
#    그래도 실제 운영/공유 환경에는 절대 쓰지 말 것 — 값이 커밋되어 있다(로컬 재현용).
#    DB_USER/DB_PASSWORD 는 postgres.yaml 의 initdb 역할과 반드시 일치해야 한다.
