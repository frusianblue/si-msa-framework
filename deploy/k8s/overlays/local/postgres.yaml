# deploy/k8s/overlays/local/postgres.yaml
# 로컬 전용 인-클러스터 PostgreSQL — kind/minikube 등 자기완결 클러스터에서 4개 서비스를
# 실제로 기동/검증하기 위한 throwaway DB. 운영/개발 서버에는 절대 쓰지 않는다(영속성 없음).
#   - Service 이름을 'postgres' 로 두어 base 의 DB_URL(jdbc:postgresql://postgres:5432/...) 이 그대로 풀린다.
#   - initdb 스크립트로 authdb/sidb 두 DB 와 앱 역할(authuser/siuser)을 생성 — secrets-local.yaml 의 계정과 일치.
#   - component: database 라벨 → base 의 hardened 패치/ServiceMonitor 대상에서 제외(redis 와 동일 원리).
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  labels:
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: database
data:
  # /docker-entrypoint-initdb.d 의 .sql 은 최초 1회(빈 데이터 디렉토리)만 psql 로 실행된다.
  init.sql: |
    CREATE ROLE authuser WITH LOGIN PASSWORD 'dev-authpass';
    CREATE ROLE siuser   WITH LOGIN PASSWORD 'dev-sipass';
    CREATE DATABASE authdb OWNER authuser;
    CREATE DATABASE sidb   OWNER siuser;
    \connect authdb
    GRANT ALL ON SCHEMA public TO authuser;
    \connect sidb
    GRANT ALL ON SCHEMA public TO siuser;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: si-msa
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER,     value: "postgres" }
            - { name: POSTGRES_PASSWORD, value: "postgres" }   # superuser(부트스트랩 전용, 로컬만)
            - { name: POSTGRES_DB,       value: "postgres" }
            - { name: PGDATA,            value: "/var/lib/postgresql/data/pgdata" }
          ports:
            - { name: postgres, containerPort: 5432 }
          volumeMounts:
            - { name: data,   mountPath: /var/lib/postgresql/data }
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - { name: data, emptyDir: {} }   # 휘발 — 파드 재생성 시 DB 초기화(로컬 테스트용)
        - name: initdb
          configMap:
            name: postgres-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: si-msa
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
