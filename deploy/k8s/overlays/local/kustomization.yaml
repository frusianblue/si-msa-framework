# deploy/k8s/overlays/local/kustomization.yaml
# LOCAL: kind/minikube 등 자기완결 클러스터용. 인-클러스터 Postgres(authdb+userdb) 동봉,
#        ServiceMonitor 제거(Prometheus Operator CRD 불요), 로컬 빌드 이미지(:local) 사용.
#   한 줄 배포:  kubectl apply -k deploy/k8s/overlays/local
#   ※ DB_URL 패치 없음 — base 가 이미 'postgres' 호스트를 가리키므로 동봉 Postgres Service(postgres)로 그대로 연결.
#   ※ Redis 도 base 의 인-클러스터 redis 를 그대로 사용.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: si-msa

resources:
  - ../../base
  - postgres.yaml
  - secrets-local.yaml

# 로컬은 서비스당 1 레플리카
replicas:
  - { name: gateway,       count: 1 }
  - { name: auth-server,   count: 1 }
  - { name: user-service,  count: 1 }
  - { name: admin-service, count: 1 }

# 로컬 빌드 이미지(:local). :latest 가 아니므로 기본 imagePullPolicy=IfNotPresent →
# kind load / minikube image load 로 노드에 적재된 이미지를 그대로 쓰고 레지스트리 접속을 시도하지 않는다.
#   ⚠️ name 도 함께 바꾼다(newName): 로컬은 레지스트리가 없으므로 가짜 registry.example.com 접두어를 떼고
#      compose 가 실제로 빌드하는 short name(si-msa/<svc>:local)에 맞춘다.
#      newTag 만 바꾸면 name 은 registry.example.com/... 로 남아 노드에 적재된 si-msa/... 와 불일치 →
#      IfNotPresent 가 노드에서 못 찾고 가짜 레지스트리로 pull 시도 → ImagePullBackOff.
#      적재: kind load docker-image si-msa/<svc>:local --name si-msa  (compose 빌드 이미지 그대로 재사용 가능)
images:
  - { name: registry.example.com/si-msa/gateway,       newName: si-msa/gateway,       newTag: local }
  - { name: registry.example.com/si-msa/auth-server,   newName: si-msa/auth-server,   newTag: local }
  - { name: registry.example.com/si-msa/user-service,  newName: si-msa/user-service,  newTag: local }
  - { name: registry.example.com/si-msa/admin-service, newName: si-msa/admin-service, newTag: local }

patches:
  # auth-server: prod 프로파일이라 LocalDemo(@Profile("local")) 비활성 → oauth2_registered_client 0건(설계).
  #   authorization_code+PKCE 토큰 플로우(=DbAuthenticator 운영 인증 경로) 스모크 검증을 위해 시더를 옵트인한다.
  #   SmokeClientSeeder(@ConditionalOnProperty framework.auth.seed-smoke-client=true)가 demo-web(public+PKCE)+
  #   demo-service(client_credentials)를 repo.save() 로 등록. 프로파일/DbAuthenticator 무영향. dev/prod overlay 엔 미적용(기본 false).
  #   ⚠️ 이 플래그는 auth-server 이미지에 시더 클래스가 포함된 빌드가 노드에 적재돼야 동작 → 시더 추가 후 이미지 재빌드 1회 필요
  #      (Docker Desktop kind = registry-mirror 자동노출이라 적재 단계 불요): docker build -t si-msa/auth-server:local …
  #      후 kubectl -n si-msa rollout restart deploy/auth-server.
  - target: { kind: ConfigMap, name: auth-server-config }
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata: { name: auth-server-config }
      data:
        FRAMEWORK_AUTH_SEED_SMOKE_CLIENT: "true"
  # admin-service: 전용 DB(admindb) + 컨테이너 쓰기 가능한 업로드 경로(local 파일저장, readOnlyRootFilesystem).
  #   base 가 admindb 로 분리되어 있으므로 명시적 재선언(중복 무해). user(userdb)·admin(admindb) 별도 계정으로 Flyway 충돌 원천 차단.
  #   (운영 overlay 도 admin 전용 DB 권장. admin 업로드는 실운영에선 PVC/NAS 또는 file 모듈 비활성.)
  - target: { kind: ConfigMap, name: admin-service-config }
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata: { name: admin-service-config }
      data:
        DB_URL: jdbc:postgresql://postgres:5432/admindb
        FRAMEWORK_FILE_STORAGE_BASE_PATH: /tmp/uploads
  # user-service: 로컬 테스트는 S3 없음 → local 파일저장 + 쓰기 가능한 /tmp 경로로 덮음.
  #   (base 는 FILE_STORAGE_TYPE=s3 유지 — 실운영은 framework-file-s3 주석 해제 + S3 자격증명.)
  - target: { kind: ConfigMap, name: user-service-config }
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata: { name: user-service-config }
      data:
        FILE_STORAGE_TYPE: local
        FRAMEWORK_FILE_STORAGE_BASE_PATH: /tmp/uploads

  # ServiceMonitor 제거 — 로컬 클러스터엔 monitoring.coreos.com CRD 가 없어 그대로 두면 apply 전체가 실패한다.
  # 관측까지 보려면 이 패치를 빼고 kube-prometheus-stack(Helm)으로 오퍼레이터/CRD 를 먼저 설치한다.
  - target: { group: monitoring.coreos.com, version: v1, kind: ServiceMonitor, name: si-msa-services }
    patch: |-
      $patch: delete
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: si-msa-services
