# deploy/k8s/overlays/prod/secrets-prod.example.yaml
# ============================================================================
# 이 파일은 "양식 예시"일 뿐 prod kustomization 에 포함되지 않는다(배포 안 됨).
# 운영 시크릿은 절대 git 에 커밋하지 않는다. 다음 중 하나로 클러스터에 사전 주입한다:
#   - External Secrets Operator: ExternalSecret CR → AWS Secrets Manager / Vault 에서 동기화
#   - Sealed Secrets: kubeseal 로 암호화한 SealedSecret 만 커밋
# prod Deployment 의 envFrom.secretRef 가 참조하는 아래 4개 Secret 이름이 네임스페이스(si-msa)에
# 미리 존재해야 한다(없으면 파드가 기동 못 함).
# ============================================================================
# 필요한 Secret 이름과 키(값은 운영 비밀로 주입):
#   gateway-secret       : JWT_SECRET
#   auth-server-secret   : DB_USER, DB_PASSWORD, FRAMEWORK_JWT_SECRET, AES_SECRET
#   user-service-secret  : DB_USER, DB_PASSWORD, JWT_SECRET, AES_SECRET
#   admin-service-secret : DB_USER, DB_PASSWORD, JWT_SECRET, AES_SECRET
#
# (예: 수동 생성 — CI/운영자 1회성)
#   kubectl -n si-msa create secret generic user-service-secret \
#     --from-literal=DB_USER=user_app \
#     --from-literal=DB_PASSWORD='<강한 비밀>' \
#     --from-literal=JWT_SECRET='<32바이트 이상 강한 키>' \
#     --from-literal=AES_SECRET='<16바이트 이상 강한 키>'
