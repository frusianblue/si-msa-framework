# deploy/k8s/overlays/dev/secrets-dev.yaml
# ⚠️ DEV 전용 약한 placeholder 시크릿. 운영(prod)에는 절대 사용 금지.
#    prod 는 시크릿을 커밋하지 않고 External Secrets Operator / SealedSecrets 로 사전 주입한다(overlays/prod 참고).
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
type: Opaque
stringData:
  JWT_SECRET: "dev-only-change-this-to-a-very-long-secret-key-32bytes!!"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-server-secret
type: Opaque
stringData:
  DB_USER: "authuser"
  DB_PASSWORD: "dev-authpass"
  FRAMEWORK_JWT_SECRET: "dev-only-change-this-to-a-very-long-secret-key-32b!!"
  AES_SECRET: "dev-only-aes-secret-change-me-16bytes-min"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
type: Opaque
stringData:
  DB_USER: "siuser"
  DB_PASSWORD: "dev-sipass"
  JWT_SECRET: "dev-only-change-this-to-a-very-long-secret-key-32bytes!!"
  AES_SECRET: "dev-only-aes-secret-change-me-16bytes-min"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-service-secret
type: Opaque
stringData:
  DB_USER: "siuser"
  DB_PASSWORD: "dev-sipass"
  JWT_SECRET: "dev-only-change-this-to-a-very-long-secret-key-32bytes!!"
  AES_SECRET: "dev-only-aes-secret-change-me-16bytes-min"
