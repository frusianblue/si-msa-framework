# deploy/k8s/overlays/dev/secrets-dev.yaml
# ⚠️ DEV 전용 약한 시크릿. 운영(prod)에는 절대 사용 금지.
#    prod 는 시크릿을 커밋하지 않고 External Secrets Operator / SealedSecrets 로 사전 주입한다(overlays/prod 참고).
#
# ★ 중요: 이 dev overlay 는 Spring `prod` 프로파일로 뜬다(base configmap SPRING_PROFILES_ACTIVE: prod).
#    따라서 AES/JWT 안전가드(AesMasterKeySafetyGuard / JwtSecretSafetyGuard)가 *경고가 아니라 부팅 차단*으로 작동한다.
#    가드 통과 요건(소스 확인):
#      - "change-me" / "change-this" 문자열을 포함하면 안 됨(placeholder 미교체 탐지, 대소문자 무시)
#      - AES_SECRET ≥ 16바이트, JWT_SECRET/FRAMEWORK_JWT_SECRET ≥ 32바이트
#    아래 값들은 dev 전용이지만 가드를 통과하도록 placeholder 흔적을 제거하고 길이를 맞췄다.
#    4서비스 동일 값 사용: HS256 self-issued JWT 의 서비스 간 상호검증 + ENC(...) 복호화 신뢰기반 일관성.
#    (gateway 는 기본 프로파일이라 가드가 경고만 하지만, 토큰 검증 정합을 위해 동일 JWT 키를 둔다.)
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
type: Opaque
stringData:
  JWT_SECRET: "dev-jwt-hs256-secret-not-for-prod-0123456789abcdef0123"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-server-secret
type: Opaque
stringData:
  DB_USER: "authuser"
  DB_PASSWORD: "dev-authpass"
  FRAMEWORK_JWT_SECRET: "dev-jwt-hs256-secret-not-for-prod-0123456789abcdef0123"
  AES_SECRET: "dev-aes-master-key-not-for-prod-0123456789abcdef"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
type: Opaque
stringData:
  DB_USER: "siuser"
  DB_PASSWORD: "dev-sipass"
  JWT_SECRET: "dev-jwt-hs256-secret-not-for-prod-0123456789abcdef0123"
  AES_SECRET: "dev-aes-master-key-not-for-prod-0123456789abcdef"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-service-secret
type: Opaque
stringData:
  DB_USER: "siuser"
  DB_PASSWORD: "dev-sipass"
  JWT_SECRET: "dev-jwt-hs256-secret-not-for-prod-0123456789abcdef0123"
  AES_SECRET: "dev-aes-master-key-not-for-prod-0123456789abcdef"
