# deploy/k8s/overlays/dev/kustomization.yaml
# DEV(운영 토폴로지 리허설 — S3): 단일 레플리카, Harbor 이미지(:<git-sha> 핀), 약한 시크릿 동봉,
#   인-클러스터 영속 postgres(components/postgres-persistent)로 DB 를 끼운다.
#   한 줄 배포:  kubectl apply -k deploy/k8s/overlays/dev
#   ※ 이전(외부 dev-postgres.internal) 전제는 폐기 — 이 환경에서 운영 경로를 자기완결로 리허설한다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: si-msa

resources:
  - ../../base
  - ../../components/postgres-persistent   # 인-클러스터 영속 postgres(StatefulSet+PVC). DB_URL=postgres:5432 로 해소.
  - secrets-dev.yaml
  - pull-secret-dev.yaml                    # harbor-cred(dockerconfigjson) + default SA 부착 → Harbor pull.

# 비용 절감: dev 는 서비스당 1 레플리카
replicas:
  - { name: gateway,       count: 1 }
  - { name: auth-server,   count: 1 }
  - { name: user-service,  count: 1 }
  - { name: admin-service, count: 1 }

# 이미지 핀: Harbor(harbor.local) + **불변 태그(주입식)**. 가변 채널 태그 `:dev` 는 폐기.
#   설계(B 결정 2026-06-07):
#     · 무엇이 뜨는지의 단일 진실 = **불변 git-sha 태그**. 가변 `:dev` 핀 + `kubectl set image :<sha>` 덮어쓰기의
#       선언/명령 혼용(=git↔클러스터 드리프트)을 제거한다.
#     · `newTag: __GITSHA__` 는 **CI/스크립트가 체크아웃 워크스페이스에서만 치환**하는 sentinel 이다(되커밋 X).
#       주입은 공용 헬퍼 `deploy/k8s/pin-image-tag.sh <overlay-dir> <tag>` 한 곳에서만 한다(CI·수동 트랙 공용).
#     · git 에 박힌 기본값이 sentinel 인 이유 = **fail-loud**. 태그 미주입 상태로 `kubectl apply -k` 하면
#       `:__GITSHA__` 부재로 ImagePullBackOff → "옛 :dev 가 조용히 뜨던" stale 사고(과거 §③)를 구조적으로 차단.
#   ⚠️ **이 환경(Docker Desktop kind)에선 harbor.local 직접 pull 이 미러 인터셉트로 불가**(PITFALLS §9) →
#      이 핀(harbor.local/...:<sha>)이 실제로 pull 되는 건 **standalone kind 트랙**(03-dev-overlay-up.sh)에서 검증.
#   base 의 가짜 registry.example.com 접두어를 Harbor 주소로 newName 치환.
#   ※ 임시 수동 apply 가 필요하면: `bash deploy/k8s/pin-image-tag.sh <복사한_overlay_dir> <태그>` 후 그 dir 로 apply.
images:
  - { name: registry.example.com/si-msa/gateway,       newName: harbor.local/si-msa/gateway,       newTag: __GITSHA__ }
  - { name: registry.example.com/si-msa/auth-server,   newName: harbor.local/si-msa/auth-server,   newTag: __GITSHA__ }
  - { name: registry.example.com/si-msa/user-service,  newName: harbor.local/si-msa/user-service,  newTag: __GITSHA__ }
  - { name: registry.example.com/si-msa/admin-service, newName: harbor.local/si-msa/admin-service, newTag: __GITSHA__ }

patches:
  # ── 이미지풀시크릿: default SA 변경(fresh ns AlreadyExists 레이스) 대신 앱 파드 템플릿에 직접 주입. ──
  #   component=service = gateway/auth-server/user-service/admin-service(redis=cache, postgres=StatefulSet 제외).
  #   재apply 멱등, 템플릿 변경이라 apply 시 자동 rollout → 신규 파드가 harbor-cred 로 비공개 pull.
  - target: { kind: Deployment, labelSelector: "app.kubernetes.io/component=service" }
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: harbor-cred

  # ── DB: 외부 호스트 → 인-클러스터 영속 postgres(Service 'postgres'). ────────────────────────────
  #   auth=authdb / user=sidb / admin=admindb. (admin 을 sidb 로 두면 user 와 같은 siuser·sidb 에서
  #   Flyway V1 동일 테이블 충돌 → admindb 로 분리. components/postgres-persistent initdb 가 3 DB 생성.)
  - target: { kind: ConfigMap, name: auth-server-config }
    patch: |-
      - op: replace
        path: /data/DB_URL
        value: jdbc:postgresql://postgres:5432/authdb
  - target: { kind: ConfigMap, name: user-service-config }
    patch: |-
      - op: replace
        path: /data/DB_URL
        value: jdbc:postgresql://postgres:5432/sidb
  - target: { kind: ConfigMap, name: admin-service-config }
    patch: |-
      - op: replace
        path: /data/DB_URL
        value: jdbc:postgresql://postgres:5432/admindb

  # ── 파일저장: 이 환경엔 S3 없음 + 루트FS 읽기전용(hardening) → local 저장 + 쓰기가능 /tmp 경로. ──
  #   (local overlay 와 동일 근거. 운영 overlay 는 framework-file-s3 주석 해제 + S3 자격증명으로 대체.)
  - target: { kind: ConfigMap, name: user-service-config }
    patch: |-
      - op: replace
        path: /data/FILE_STORAGE_TYPE
        value: local
      - op: add
        path: /data/FRAMEWORK_FILE_STORAGE_BASE_PATH
        value: /tmp/uploads
  - target: { kind: ConfigMap, name: admin-service-config }
    patch: |-
      - op: add
        path: /data/FRAMEWORK_FILE_STORAGE_BASE_PATH
        value: /tmp/uploads

  # ── ServiceMonitor: S4-2(kube-prometheus-stack) 설치로 활성화됨 ──
  #   이전엔 monitoring.coreos.com CRD 부재로 base 의 si-msa-services SM 을 $patch:delete 했으나,
  #   05-prometheus-stack.sh 가 Prometheus Operator(=CRD)를 설치하므로 그 delete 패치를 제거해 SM 을 그대로 적용한다.
  #   base SM 의 release=kube-prometheus-stack 라벨이 Operator serviceMonitorSelector 와 매칭(+ 스크립트가 NilUsesHelmValues=false 로 전체수용).
  #   ⚠️ kube-prometheus-stack 미설치 클러스터에 apply 하면 `no matches for kind "ServiceMonitor"` → 먼저 05 스크립트 실행.
