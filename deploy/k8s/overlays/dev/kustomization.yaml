# deploy/k8s/overlays/dev/kustomization.yaml
# DEV(운영 토폴로지 리허설 — S3): 단일 레플리카, Harbor 이미지(:<git-sha> 핀), 약한 시크릿 동봉,
#   인-클러스터 영속 postgres(components/postgres-persistent)로 DB 를 끼운다.
#   한 줄 배포:  kubectl apply -k deploy/k8s/overlays/dev
#   ※ 이전(외부 dev-postgres.internal) 전제는 폐기 — 이 환경에서 운영 경로를 자기완결로 리허설한다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: si-msa

resources:
  - ../../base
  - ../../components/postgres-persistent   # 인-클러스터 영속 postgres(StatefulSet+PVC). DB_URL=postgres:5432 로 해소.
  - secrets-dev.yaml
  - pull-secret-dev.yaml                    # harbor-cred(dockerconfigjson) + default SA 부착 → Harbor pull.

# 비용 절감: dev 는 서비스당 1 레플리카
replicas:
  - { name: gateway,       count: 1 }
  - { name: auth-server,   count: 1 }
  - { name: user-service,  count: 1 }
  - { name: admin-service, count: 1 }

# 이미지 핀: Harbor(harbor.local) + 채널 태그(:dev).
#   ⚠️ 이전 `:7e935d6` 핀은 **stale** — Harbor 에 부재(실재 태그=6849550/dev/f370bc7)였고 노드가 없는 태그를 당기려 함.
#      손으로 박은 sha 가 어긋난 것 자체가 **수동 핀의 증상**: 불변 sha 핀은 사람이 타이핑할 게 아니라
#      CI(S7)가 그 빌드의 sha 로 `kustomize edit set image ...=harbor.local/si-msa/<svc>:<그-sha>` 로 주입한다.
#      수동 리허설 동안은 채널 태그 `:dev`(항상 실재, standalone kind 타깃에서 그대로 pull) 로 둔다.
#   ⚠️ **이 환경(Docker Desktop kind)에선 harbor.local 직접 pull 이 미러 인터셉트로 불가**(PITFALLS §9) →
#      이 핀(harbor.local/...:dev)이 실제로 pull 되는 건 **standalone kind 트랙**(NEXT §S3' )에서 검증.
#   base 의 가짜 registry.example.com 접두어를 Harbor 주소로 newName 치환.
images:
  - { name: registry.example.com/si-msa/gateway,       newName: harbor.local/si-msa/gateway,       newTag: dev }
  - { name: registry.example.com/si-msa/auth-server,   newName: harbor.local/si-msa/auth-server,   newTag: dev }
  - { name: registry.example.com/si-msa/user-service,  newName: harbor.local/si-msa/user-service,  newTag: dev }
  - { name: registry.example.com/si-msa/admin-service, newName: harbor.local/si-msa/admin-service, newTag: dev }

patches:
  # ── DB: 외부 호스트 → 인-클러스터 영속 postgres(Service 'postgres'). ────────────────────────────
  #   auth=authdb / user=sidb / admin=admindb. (admin 을 sidb 로 두면 user 와 같은 siuser·sidb 에서
  #   Flyway V1 동일 테이블 충돌 → admindb 로 분리. components/postgres-persistent initdb 가 3 DB 생성.)
  - target: { kind: ConfigMap, name: auth-server-config }
    patch: |-
      - op: replace
        path: /data/DB_URL
        value: jdbc:postgresql://postgres:5432/authdb
  - target: { kind: ConfigMap, name: user-service-config }
    patch: |-
      - op: replace
        path: /data/DB_URL
        value: jdbc:postgresql://postgres:5432/sidb
  - target: { kind: ConfigMap, name: admin-service-config }
    patch: |-
      - op: replace
        path: /data/DB_URL
        value: jdbc:postgresql://postgres:5432/admindb

  # ── 파일저장: 이 환경엔 S3 없음 + 루트FS 읽기전용(hardening) → local 저장 + 쓰기가능 /tmp 경로. ──
  #   (local overlay 와 동일 근거. 운영 overlay 는 framework-file-s3 주석 해제 + S3 자격증명으로 대체.)
  - target: { kind: ConfigMap, name: user-service-config }
    patch: |-
      - op: replace
        path: /data/FILE_STORAGE_TYPE
        value: local
      - op: add
        path: /data/FRAMEWORK_FILE_STORAGE_BASE_PATH
        value: /tmp/uploads
  - target: { kind: ConfigMap, name: admin-service-config }
    patch: |-
      - op: add
        path: /data/FRAMEWORK_FILE_STORAGE_BASE_PATH
        value: /tmp/uploads

  # ── ServiceMonitor 제거 — 이 클러스터엔 아직 monitoring.coreos.com CRD 가 없다(S4 kube-prometheus-stack 에서 설치). ──
  #   그대로 두면 `no matches for kind "ServiceMonitor"` 로 apply 가 에러(나머지는 적용되지만 비클린/CI 깨짐). local overlay 와 동일.
  #   ⚠️ S4 에서 Prometheus Operator 설치 후 이 delete 패치를 제거하면 dev 도 ServiceMonitor 로 관측됨(dev=prod-like 관측).
  - target: { group: monitoring.coreos.com, version: v1, kind: ServiceMonitor, name: si-msa-services }
    patch: |-
      $patch: delete
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: si-msa-services
