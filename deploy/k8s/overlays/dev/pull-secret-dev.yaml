# deploy/k8s/overlays/dev/pull-secret-dev.yaml
# ⚠️ DEV 전용 — Harbor 풀 자격증명(admin/Harbor12345, 알려진 로컬 기본값). 운영 금지.
#    운영은 ESO/SealedSecrets 로 imagePullSecrets 를 사전 주입(overlays/prod 참고).
# harbor.local(HTTP, ingress) 에서 si-msa/<svc>:<sha> 를 노드 containerd 가 pull 할 때 사용.
#   auth = base64("admin:Harbor12345") = YWRtaW46SGFyYm9yMTIzNDU=
apiVersion: v1
kind: Secret
metadata:
  name: harbor-cred
  labels:
    app.kubernetes.io/part-of: si-msa
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"harbor.local":{"username":"admin","password":"Harbor12345","auth":"YWRtaW46SGFyYm9yMTIzNDU="}}}
---
# default ServiceAccount 에 harbor-cred 부착 → ns 내 모든 파드(명시 SA 미지정 = default)가 Harbor pull.
#   기존 자동생성 default SA 를 apply 가 머지(imagePullSecrets 추가). 새 파드 생성 시점부터 적용 →
#   dev overlay 최초 apply 는 앱 파드가 이때 처음 생기므로 그대로 반영된다.
#   (선언형 대신 명령형도 동치:  kubectl -n si-msa patch sa default \
#     -p '{"imagePullSecrets":[{"name":"harbor-cred"}]}')
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
imagePullSecrets:
  - name: harbor-cred
