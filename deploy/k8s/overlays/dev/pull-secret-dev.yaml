# deploy/k8s/overlays/dev/pull-secret-dev.yaml
# ⚠️ DEV 전용 — Harbor 풀 자격증명(admin/Harbor12345, 알려진 로컬 기본값). 운영 금지.
#    운영은 ESO/SealedSecrets 로 imagePullSecrets 를 사전 주입(overlays/prod 참고).
# harbor.local(HTTP, ingress) 에서 si-msa/<svc>:<sha> 를 노드 containerd 가 pull 할 때 사용.
#   auth = base64("admin:Harbor12345") = YWRtaW46SGFyYm9yMTIzNDU=
apiVersion: v1
kind: Secret
metadata:
  name: harbor-cred
  labels:
    app.kubernetes.io/part-of: si-msa
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"harbor.local":{"username":"admin","password":"Harbor12345","auth":"YWRtaW46SGFyYm9yMTIzNDU="}}}
# ⚠️ default ServiceAccount 변경은 하지 않는다 — 신규 네임스페이스(si-msa)를 같은 apply 에서 만들면
#    자동생성되는 default SA 와 레이스가 나 `serviceaccounts "default" already exists` 로 apply 가 실패하고
#    imagePullSecrets 가 안 붙는다(→ 비공개 레지스트리 pull 이 401 → ImagePullBackOff). [PITFALLS §9]
#    대신 kustomization.yaml 의 patch 가 앱 파드 템플릿(component=service)에 imagePullSecrets 를 직접 주입한다
#    (default SA 무관, 재apply 멱등, 신규 파드부터 적용).
