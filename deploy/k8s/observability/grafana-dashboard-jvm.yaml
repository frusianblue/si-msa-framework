              "type": "prometheus",
              "uid": "prometheus"
            },
            "gridPos": {
              "x": 0,
              "y": 1,
              "w": 6,
              "h": 4
            },
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {
                      "color": "green",
                      "value": null
                    }
                  ]
                }
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": {
                "calcs": [
                  "lastNotNull"
                ],
                "fields": "",
                "values": false
              },
              "graphMode": "area",
              "colorMode": "value",
              "justifyMode": "auto",
              "textMode": "auto"
            },
            "targets": [
              {
                "datasource": {
                  "type": "prometheus",
                  "uid": "prometheus"
                },
                "editorMode": "code",
                "expr": "process_uptime_seconds{namespace=\"si-msa\", service=~\"$service\"}",
                "legendFormat": "{{service}}",
                "range": true,
                "refId": "A"
              }
            ]
          },
          {
            "id": 3,
