# deploy/k8s/observability/grafana-dashboard-jvm.yaml
# si-msa 자작 JVM/Micrometer Grafana 대시보드 — kube-prometheus-stack Grafana sidecar 가 자동 적재.
#   전제(검증됨, kube-prometheus-stack values): grafana.sidecar.dashboards
#     enabled=true · label=grafana_dashboard · labelValue="1" · searchNamespace=ALL
#   → 아래 라벨 grafana_dashboard:"1" 만 달려 있으면 어느 네임스페이스에 두든 자동 import(수동 import 불필요, helm 변경 불필요).
#   데이터소스 uid=prometheus(차트 기본값), 서비스 식별 라벨=service(Operator 가 ServiceMonitor 타깃에 주입).
#   폴더 어노테이션 grafana_folder 는 sidecar.dashboards.folderAnnotation 기본키(미인식 시 General 폴더로 떨어짐 — 무해).
#   적용:  kubectl apply -f deploy/k8s/observability/grafana-dashboard-jvm.yaml
#         (또는 standalone-kind/06-grafana-jvm-dashboard.sh 가 대신 적용 + 4/4 타깃 검증)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jvm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: si-msa
  annotations:
    grafana_folder: "si-msa"
data:
  jvm-dashboard.json: |
      {
        "uid": "si-msa-jvm",
        "title": "si-msa · JVM / Micrometer",
        "tags": [
          "si-msa",
          "jvm",
          "micrometer"
        ],
        "timezone": "browser",
        "schemaVersion": 39,
        "version": 1,
        "editable": true,
        "graphTooltip": 1,
        "refresh": "30s",
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "templating": {
          "list": [
            {
              "name": "service",
              "type": "query",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "label": "Service",
              "query": {
                "query": "label_values(process_uptime_seconds{namespace=\"si-msa\"}, service)",
                "refId": "service"
              },
              "definition": "label_values(process_uptime_seconds{namespace=\"si-msa\"}, service)",
              "includeAll": true,
              "multi": true,
              "allValue": ".*",
              "current": {
                "selected": true,
                "text": [
                  "All"
                ],
                "value": [
                  "$__all"
                ]
              },
              "refresh": 2,
              "sort": 1
            }
          ]
        },
        "annotations": {
          "list": []
        },
        "panels": [
          {
            "id": 1,
            "type": "row",
            "title": "개요 (Overview)",
            "collapsed": false,
            "gridPos": {
              "x": 0,
              "y": 0,
              "w": 24,
              "h": 1
            },
            "panels": []
          },
          {
            "id": 2,
            "type": "stat",
            "title": "Uptime",
            "description": "프로세스 가동시간",
