# user-service-config — 비밀 아님. (DB 계정/JWT/AES 는 Secret)
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  labels:
    app.kubernetes.io/part-of: si-msa
data:
  SPRING_PROFILES_ACTIVE: "prod"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DB_URL: "jdbc:postgresql://postgres:5432/sidb"
  AUTH_SERVER_ISSUER: "http://auth-server:9000"
  AUTH_SERVER_JWKS_URI: "http://auth-server:9000/oauth2/jwks"
  RESOURCE_SERVER_ENABLED: "false"
  # 파일 저장소: framework-file-s3 모듈이 주석(미의존)인 동안 type=s3 면 FileStorage 빈이 없어 기동 실패.
  #   당장 S3 미사용 → local. base-path 는 deployment-hardening 의 FRAMEWORK_FILE_STORAGE_BASE_PATH(/tmp/uploads).
  #   (운영 영속 업로드는 framework-file-s3 의존 해제 + type=s3 + S3 자격증명, 또는 PVC 로 전환.)
  FILE_STORAGE_TYPE: "local"
  TRACE_SAMPLING: "0.1"
