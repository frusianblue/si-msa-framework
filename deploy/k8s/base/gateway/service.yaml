# gateway Service — 진입점. 외부 노출은 Ingress/LoadBalancer 로 별도(아래 ClusterIP 는 클러스터 내부용).
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: service
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
