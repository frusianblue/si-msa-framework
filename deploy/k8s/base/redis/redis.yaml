# deploy/k8s/base/redis/redis.yaml
# 인-클러스터 Redis — 게이트웨이 레이트리밋(토큰버킷) + user/admin 토큰스토어/캐시 백엔드.
#   비영속(emptyDir): 레이트리밋/캐시/토큰 모두 재기동 시 재구성 가능한 휘발 데이터 → 비영속 OK.
#   ⚠️ 운영(prod)은 매니지드 Redis(ElastiCache 등) 권장 → overlay 에서 REDIS_HOST 를 외부 엔드포인트로 치환하고
#      이 매니페스트는 dev overlay 에서만 포함(prod overlay 는 미포함).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: si-msa
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # redis:7-alpine 의 redis 사용자
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]   # 영속 비활성(휘발)
          ports:
            - name: redis
              containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          livenessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 10
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: si-msa
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
