# deploy/k8s/base/admin-service/deployment.yaml — DB(sidb) + Redis 필요.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  labels:
    app.kubernetes.io/name: admin-service
    app.kubernetes.io/part-of: si-msa
    app.kubernetes.io/component: service
    siframework.io/hardened: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-service
        app.kubernetes.io/part-of: si-msa
        app.kubernetes.io/component: service
        siframework.io/hardened: "true"
    spec:
      containers:
        - name: app
          image: registry.example.com/si-msa/admin-service:latest
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef: { name: admin-service-config }
            - secretRef:    { name: admin-service-secret }
