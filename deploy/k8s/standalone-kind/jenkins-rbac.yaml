# deploy/k8s/standalone-kind/jenkins-rbac.yaml
# ─────────────────────────────────────────────────────────────────────────────
# 파이프라인 agent 파드(jenkins ns)가 si-msa 네임스페이스로 배포(apply/set image/rollout)할 권한.
#   - SA: jenkins-deployer (jenkins ns) — Jenkinsfile.kind podTemplate 가 이 SA 로 파드 기동.
#   - si-msa 에 built-in 'edit' ClusterRole 바인딩(Deployment/Service/ConfigMap/Secret/StatefulSet 등 표준 리소스).
#   - 추가: monitoring.coreos.com(ServiceMonitor)·autoscaling(HPA)·networking(Ingress) 은 edit 에 일부 포함되나
#     ServiceMonitor(CRD)는 별도 Role 로 보강.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-deployer
  namespace: jenkins
---
# si-msa 표준 리소스 편집 권한(built-in edit 재사용)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer-edit
  namespace: si-msa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: jenkins-deployer
    namespace: jenkins
---
# ServiceMonitor(CRD) 보강 — base 의 si-msa-services SM 을 apply -k 가 건드릴 수 있으므로.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer-monitoring
  namespace: si-msa
rules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer-monitoring
  namespace: si-msa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-deployer-monitoring
subjects:
  - kind: ServiceAccount
    name: jenkins-deployer
    namespace: jenkins
---
# si-msa 네임스페이스 객체(클러스터 스코프) patch 권한.
#   왜: `kubectl apply -k overlays/dev` 의 kustomize 출력에는 base/namespace.yaml 의 Namespace/si-msa 가 포함된다.
#       apply 는 모든 객체에 3-way merge patch 를 거는데, Namespace 는 **클러스터 스코프** 라
#       위의 RoleBinding(edit, 네임스페이스 한정)으론 못 건드린다 →
#       `namespaces "si-msa" is forbidden: ... cannot patch resource "namespaces"`.
#   해결: ClusterRole 로 namespaces get/patch 를 주되 **resourceNames: [si-msa] 로 그 한 객체만** 허용(최소권한).
#       (생성은 09-jenkins-install.sh 가 admin 컨텍스트로 선보장 → CI 는 patch 만 필요.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-deployer-namespace
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "patch"]
    resourceNames: ["si-msa"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-deployer-namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jenkins-deployer-namespace
subjects:
  - kind: ServiceAccount
    name: jenkins-deployer
    namespace: jenkins
