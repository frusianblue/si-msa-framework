# deploy/compose/docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# 로컬 통합 실행(A안): 4개 서비스를 소스부터 컨테이너 안에서 빌드 + PostgreSQL/Redis 동봉.
# 환경값은 deploy/k8s/overlays/local 의 ConfigMap/Secret 과 동일하게 맞췄다(= kind 배포와 같은 경로).
#   유일한 의도적 차이: admin-service 는 sidb 가 아닌 admindb 를 사용한다.
#     (user-service 와 admin-service 가 같은 sidb 에 Flyway V1/V2 를 돌리면 테이블명·체크섬 충돌로
#      두 번째 서비스 부팅이 실패한다. → README "주의" 절 참고)
#
# 실행:  docker compose -f deploy/compose/docker-compose.yml up -d --build
# 종료:  docker compose -f deploy/compose/docker-compose.yml down
# 초기화:docker compose -f deploy/compose/docker-compose.yml down -v   (DB 볼륨까지 삭제)
# ─────────────────────────────────────────────────────────────────────────────

name: si-msa-local

# ===== 공통 빌드 정의(소스 트리 = 리포지토리 루트) =====
x-build: &source-build
  context: ../..
  dockerfile: deploy/docker/Dockerfile.build

# ===== 공통 시크릿(로컬 전용, secrets-local.yaml 와 동일 값) =====
x-aes-secret: &aes-secret "CzBVep/E6Q4zWH2ix+wRNluApcrvFDleg6jN8hc8YYY="
x-app-jwt-secret: &app-jwt-secret "tN7rK2mW9pX4bL6cQ8vZ3yH5sD1aF0gJ4eU7iO2kR6wT9nB5xM3qP8zHk3nQ8vT"

# ===== 앱 공통 healthcheck =====
x-app-healthcheck: &app-healthcheck
  interval: 10s
  timeout: 3s
  retries: 18
  start_period: 90s   # Boot 4 첫 기동 + Flyway 마이그레이션 여유

services:
  # ─────────────────────────── 인프라 ───────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ─────────────────────────── 인증 서버(OP) ───────────────────────────
  auth-server:
    build:
      <<: *source-build
      args:
        SERVICE: auth-server
    image: si-msa/auth-server:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ⚠️ auth-server 의 prod 프로파일은 Authenticator 빈을 '의도적으로' 넣지 않는다(LocalDemo 가 @Profile("local")).
      #    실배포 시 프로젝트가 자체 DB/LDAP Authenticator 를 주입하는 템플릿이므로, prod 로 그냥 띄우면
      #    "required a bean of type ...Authenticator" 로 기동 실패한다.
      #    로컬 통합 검증은 demo Authenticator(demo/demo)를 제공하는 local 프로파일로 띄우되,
      #    local-postgres 오버레이로 실제 PostgreSQL 에 붙인다(H2 대신).
      SPRING_PROFILES_ACTIVE: local,local-postgres
      # local-postgres.yml 의 url 은 localhost:5432 하드코딩 → 컨테이너에선 잘못된 호스트라 env 로 덮는다.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      DB_USER: authuser
      DB_PASSWORD: dev-authpass
      AES_SECRET: *aes-secret
      AUTH_SERVER_ISSUER: http://auth-server:9000
    ports:
      - "9000:9000"
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/actuator/health | grep -q UP || exit 1"]

  # ─────────────────────────── 게이트웨이 ───────────────────────────
  gateway:
    build:
      <<: *source-build
      args:
        SERVICE: gateway
    image: si-msa/gateway:local
    depends_on:
      redis:
        condition: service_healthy
      auth-server:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GATEWAY_AUTH_ENABLED: "true"
      GATEWAY_AS_ENABLED: "false"
      GATEWAY_BLACKLIST_CHECK_ENABLED: "false"
      AUTH_SERVER_ISSUER: http://auth-server:9000
      AUTH_SERVER_JWKS_URI: http://auth-server:9000/oauth2/jwks
      # gateway 는 secrets-local 에서 별도 JWT_SECRET 을 쓴다(앱 공통 시크릿과 다름).
      JWT_SECRET: "Hk3nQ8vTpL2wZ6yB9cM4xR7dF1gJ5sA0eU3iO6kP2qN7rW4bX9zM3qP8zL6cQ8v"
    ports:
      - "8000:8000"
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/actuator/health | grep -q UP || exit 1"]

  # ─────────────────────────── 사용자 서비스 ───────────────────────────
  user-service:
    build:
      <<: *source-build
      args:
        SERVICE: user-service
    image: si-msa/user-service:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_URL: jdbc:postgresql://postgres:5432/sidb
      DB_USER: siuser
      DB_PASSWORD: dev-sipass
      JWT_SECRET: *app-jwt-secret
      AES_SECRET: *aes-secret
      AUTH_SERVER_ISSUER: http://auth-server:9000
      AUTH_SERVER_JWKS_URI: http://auth-server:9000/oauth2/jwks
      RESOURCE_SERVER_ENABLED: "false"
      FILE_STORAGE_TYPE: local      # 로컬엔 S3 가 없으므로 local 로 덮음(base 는 s3)
      # local FileStorage 는 기본경로 ./uploads(=/application/uploads)를 만드는데 컨테이너 WORKDIR 이
      # root 소유 + 앱 비루트 → AccessDenied(k8s readOnlyRootFilesystem 도 동일). 쓰기 가능한 /tmp 하위로.
      # relaxed-binding 정식 env(=framework.file.storage.base-path) → yml ${FILE_BASE_PATH} 보다 우선.
      FRAMEWORK_FILE_STORAGE_BASE_PATH: /tmp/uploads
      # logback-common(FILE/AUDIT_FILE 롤링)이 기본 ./logs 에 쓰는데 컨테이너 WORKDIR(/application)은
      # root 소유 + 앱은 비루트(uid 1001)라 생성 불가 → 부팅 실패. k8s 는 readOnlyRootFilesystem+/tmp emptyDir.
      # 둘 다에서 쓰기 가능한 /tmp 로 LOG_DIR 을 덮는다(logback ${LOG_DIR} knob). auth-server/gateway 는
      # logback-spring.xml 미포함(콘솔만)이라 불요.
      LOG_DIR: /tmp
    ports:
      - "8080:8080"
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP || exit 1"]

  # ─────────────────────────── 관리자 서비스 ───────────────────────────
  admin-service:
    build:
      <<: *source-build
      args:
        SERVICE: admin-service
    image: si-msa/admin-service:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_URL: jdbc:postgresql://postgres:5432/admindb   # ← user-service 와 분리(충돌 회피)
      DB_USER: siuser
      DB_PASSWORD: dev-sipass
      JWT_SECRET: *app-jwt-secret
      AES_SECRET: *aes-secret
      LOG_DIR: /tmp     # user-service 와 동일 사유(logback-common 파일 appender → 컨테이너 쓰기경로 /tmp)
      # admin 도 framework-file 의존(s3 모듈 미포함) → 기본 local FileStorage 가 ./uploads 생성 시도 → 동일 AccessDenied.
      FRAMEWORK_FILE_STORAGE_BASE_PATH: /tmp/uploads
    ports:
      - "8081:8081"
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q UP || exit 1"]

volumes:
  pgdata:
