# deploy/argocd/bootstrap.yaml
# ─────────────────────────────────────────────────────────────────────────────
# app-of-apps — deploy/argocd/apps/ 의 모든 Application 을 git 으로 관리하는 루트.
#   이걸 한 번 apply 하면 ArgoCD 가 apps/ 의 자식 Application(si-msa-prod 등)을 git 에서 생성·동기화.
#   이후 앱 추가/변경은 git(master)에 커밋만 하면 자동 반영(GitOps).
#   dest = in-cluster(hub=kind-cicd 의 argocd ns) — Application 객체 자체는 허브에 산다.
#
# ⚠️ ArgoCD 는 git 을 읽으므로 deploy/argocd/ 는 **master 에 커밋·푸시** 되어 있어야 한다(로컬 apply 무의미).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: si-msa-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/frusianblue/si-msa-framework.git
    targetRevision: master
    path: deploy/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
