// 선택형 모듈: 규제특화 2단계 인증(MFA — TOTP/OTP, ISMS-P 복구코드). 의존성 추가 + framework.mfa.enabled=true 로만 활성.
// 외부 의존성 0개: Base32/HOTP/TOTP/복구코드는 모두 JDK(javax.crypto.Mac, SecureRandom)로 직접 구현.
// 루트 build.gradle 이 java-library/dependency-management/spotless 를 자동 적용하므로 dependencies 만 선언.
dependencies {
    // MfaGate/MfaTicket/LoginOutcome(security), LoginService.completeMfa, CurrentUserProvider(security→mybatis 경유) 사용.
    // 의존 방향은 mfa → security 단방향(security 는 MfaGate 타입만 알고 구현은 모름).
    api project(':framework:framework-security')
    // jdbc(enrollment.store=jdbc)/redis(challenge.store=redis)/web 는 호스트 앱이 제공 → 라이브러리는 컴파일만(드래그인 방지)
    compileOnly 'org.springframework.boot:spring-boot-starter-web'
    compileOnly 'org.springframework.boot:spring-boot-starter-jdbc'
    compileOnly 'org.springframework.boot:spring-boot-starter-data-redis'
    // WebAuthn 2차(독립 등록형): framework-webauthn 이 등록한 WebAuthnRelyingPartyOperations 빈을 재사용한다.
    //   RP 연산/자격증명 저장은 spring-security-webauthn(별도 아티팩트, WebAuthn4J 전이) 에 있고, 직렬화는
    //   SS7 의 Jackson 3 모듈(WebauthnJacksonModule, tools.jackson.*)을 쓴다. webauthn 미사용 앱은 런타임 부재 →
    //   MfaAutoConfiguration 의 중첩 @ConditionalOnClass 설정이 통째로 스킵되어 안전(컴파일만, 드래그인 방지).
    compileOnly 'org.springframework.security:spring-security-webauthn'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // 오토컨피그 로딩 테스트(ApplicationContextRunner)는 MfaAutoConfiguration 을 리플렉션으로 introspect 한다.
    //   이때 @Bean 메서드의 "모든" 파라미터 타입(StringRedisTemplate/JdbcTemplate/web 컨트롤러)을 로드하므로,
    //   @ConditionalOnClass 와 무관하게 main 의 compileOnly 3종을 test 에 그대로 다시 선언해야 컨텍스트가 뜬다.
    //   (운영에선 Boot 가 ASM 으로 메타데이터를 읽어 미사용 타입을 로드하지 않으므로 redis/jdbc 없는 앱도 정상.)
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-jdbc'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-redis'
    // compileOnly 는 test 클래스패스로 전이되지 않으므로, WebAuthn 단위테스트(RP/Support mock)·오토컨피그 로딩
    //   테스트에서 SS7 webauthn 타입을 보려면 test 에 그대로 재선언해야 한다(PITFALLS: compileOnly→test 갭).
    testImplementation 'org.springframework.security:spring-security-webauthn'
}
