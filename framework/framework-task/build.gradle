// 선택형 모듈: 태스크 표준 — Spring Cloud Task 5.0.x(Boot 4 네이티브) 위에 얹는 "오케스트레이션용 단발 실행" 계층.
//   framework-batch 가 "인-프로세스 스케줄(Quartz cron) + JobOperator 온디맨드 기동"이라면,
//   framework-task 는 "한 번 실행하고 종료(run-once)하는 태스크" 모델 — 외부 오케스트레이터(SCDF) 또는 k8s Job/CronJob 이
//   기동하고, 실행 이력(시작/종료/종료코드/오류)을 태스크 저장소(JDBC=PostgreSQL, DataSource 없으면 인메모리)에 기록한다.
//
//   - EnableFrameworkTask: 앱 메인에 부착(= Spring Cloud Task @EnableTask 의 프레임워크 별칭). TaskLifecycleListener 활성 → 실행 이력 기록.
//   - FrameworkTaskExecutionListener: 태스크 시작/종료/실패 표준 감사 로깅(잡명·실행ID·종료코드·소요시간·외부실행ID·오류).
//       Spring Cloud Task 의 TaskLifecycleListener 가 컨텍스트의 TaskExecutionListener 빈을 자동 수집 → 빈 등록만으로 연결.
//   - 배치 연동: 앱에 Job 빈 + @EnableFrameworkTask 가 있으면 SCT 의 TaskBatchAutoConfiguration 이 TaskBatchExecutionListener 를
//       자동 구성 → 배치 JobExecution 이 TaskExecution 에 연결(오케스트레이터가 태스크 안에서 배치 스텝 상세를 본다).
//   - 실패 종료코드: spring.cloud.task.batch.fail-on-job-failure=true → 배치 실패 시 프로세스가 비정상 종료코드로 종료(k8s Job/SCDF 실패감지의 핵심).
//
// 의존: framework-core(에러/응답 규약) + Spring Cloud Task(core/batch) + Spring Batch 스타터(Job/JobOperator).
//   ⚠️ Spring Cloud Task 는 Spring Boot BOM / Spring Cloud(Oakwood) BOM 어디에도 없다 → 별도 BOM
//      'org.springframework.cloud:spring-cloud-task-dependencies'(=springCloudTask, libs.versions.toml) 를 루트에서 import 한다.
//      따라서 여기서는 버전 미명시(BOM 관리). spring-cloud-starter-task 는 의도적으로 쓰지 않는다(스트림 바인더까지 끌고 오므로) → core+batch 직접 의존.
//   batch/task 타입을 소비 서비스가 직접 쓰므로(Job/Step 정의, @EnableFrameworkTask) api 로 전이.
dependencies {
    // ApiResponse/에러 포맷 등 베이스 규약.
    api project(':framework:framework-core')

    // 배치 능력 전이(api): 소비 서비스가 Job/Step 을 직접 정의한다(JobOperator/JobRepository/메타테이블 = Boot batch 자동구성).
    api 'org.springframework.boot:spring-boot-starter-batch'

    // Spring Cloud Task — core(태스크 실행 이력/리스너/저장소) + batch(배치↔태스크 연동 리스너). 버전=spring-cloud-task-dependencies BOM.
    api 'org.springframework.cloud:spring-cloud-task-core'
    api 'org.springframework.cloud:spring-cloud-task-batch'

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.batch:spring-batch-test'
}
