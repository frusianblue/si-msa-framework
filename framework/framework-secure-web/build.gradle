// 선택형 모듈: 웹 보안 필터(보안 헤더·경로조작 차단·인젝션 스크리닝·CSRF 더블서브밋).
// XSS 본문 이스케이프는 framework-core 담당. 본 모듈은 그 외 시큐어코딩/심의 항목을 필터 계층에서 보강.
// 새 외부 의존성 0(버전 0): web/jackson 은 호스트 앱이 제공 → 컴파일만(드래그인 방지).
// 루트 build.gradle 이 java-library/dependency-management/spotless 를 자동 적용하므로 dependencies 만 선언.
dependencies {
    // ApiResponse/ErrorCode(표준 에러 본문) 사용. (core 가 spring-web 도 전이 노출)
    api project(':framework:framework-core')

    // 필터가 쓰는 servlet/web API(OncePerRequestFilter 등) 컴파일 확보. 런타임은 호스트가 제공 → compileOnly.
    // (거부 응답 JSON 은 Jackson 없이 수기 직렬화 — 본 스택은 Jackson 3(tools.jackson) 이라 버전 의존 회피)
    compileOnly 'org.springframework.boot:spring-boot-starter-web'

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // SecureWebAutoConfiguration: servlet 필터/FilterRegistrationBean introspection + WebApplicationContextRunner 용
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
}
