# =====================================================================
# auth-server / 공통 설정 (모든 프로파일 공유)
# ---------------------------------------------------------------------
# 우리가 OP(OAuth2/OIDC Provider) 가 되는 별도 배포 서비스.
# 환경: local | dev | prod (+ local-postgres 오버레이) — user-service 와 동일 규약.
#
# ⚠️ framework-security 와의 관계:
#   - framework.security.enabled=true 로 두어 Authenticator/LoginService 등 "사용자 소스" 빈을 재사용한다.
#   - 단, framework-security 의 기본 SecurityFilterChain 은 @ConditionalOnMissingBean(SecurityFilterChain)
#     이라, 우리가 AS 체인 2개(AuthorizationServerConfig)를 정의하면 자동 백오프한다(충돌 없음).
#   - RBAC 메뉴 DB 빈은 불필요 → framework.security.menu=false 로 끈다.
# =====================================================================
server:
  port: 9000   # AS 는 독립 포트/도메인(결정 ②: 서비스 경계)

spring:
  application:
    name: auth-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# MyBatis: 매퍼 XML 을 인터페이스와 다른 mapper/ 폴더에 두므로 위치를 명시(user-service 와 동일 규약).
#   미설정 시 SigningKeyMapper 가 바인딩 안 돼 "Invalid bound statement (not found)" 로 기동 실패.
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

# ===== Authorization Server =====
auth-server:
  # iss — 외부 접근 가능한 안정 URL(토큰/discovery 에 박힘). 운영은 환경변수로 주입.
  issuer: ${AUTH_SERVER_ISSUER:http://localhost:9000}
  # JWKS 캐시 TTL = 다중 파드 키 회전 전파 최대 지연.
  jwk-cache-ttl: 5m
  # ===== 서명키 회전/암호화 =====
  signing-key:
    rotation:
      enabled: ${SIGNING_KEY_ROTATION_ENABLED:false}        # 회전 스케줄러(기본 off — 운영에서 의도적 on)
      cron: ${SIGNING_KEY_ROTATION_CRON:0 0 4 1 * *}         # 매월 1일 04:00
      retire-grace: ${SIGNING_KEY_RETIRE_GRACE:14d}          # RETIRED 보존(폐기 후) — ≥ access수명+JWKS캐시TTL+여유
      min-interval: ${SIGNING_KEY_ROTATION_MIN_INTERVAL:1h}  # 멱등 가드: 최근 ACTIVE 이내면 스킵
    encryption:
      enabled: ${SIGNING_KEY_ENCRYPTION_ENABLED:true}        # 개인키 컬럼 암호화(쓰기) — 기본 on(안전)

framework:
  security:
    enabled: true        # 사용자 소스(Authenticator/LoginService) 재사용
    menu: false          # RBAC 메뉴 DB 빈 불필요
    jwt:
      # AS 는 자체 발급(Nimbus/JWKS)을 쓰므로 이 secret 은 framework JWT 경로용(직접 사용 안 함).
      secret: ${FRAMEWORK_JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-32-bytes!!}
    token-store:
      type: memory
  # ===== 분산 락(서명키 회전 단일 실행 = 리더 선출) =====
  #  ⚠️ 회전(@SchedulerLock)이 동작하려면 enabled=true 가 필수. 끄면 애스펙트가 없어 모든 파드가 회전(경합).
  #     다중 파드 = jdbc(SAS DB 공유, 추가 인프라 0) | redis. memory 는 단일 JVM 전용(파드 간 상호배제 불가).
  lock:
    enabled: true
    type: ${LOCK_TYPE:jdbc}
  # ===== AES 암호화(개인키 컬럼 보호 마스터키) =====
  #  운영: AES_SECRET 을 16바이트 이상 강한 키로 주입(prod 가드가 기본키/약한키를 부팅 차단). 로컬은 기본 placeholder 허용.
  crypto:
    enabled: true
    aes-secret: ${AES_SECRET:change-me-please-set-framework-crypto-aes-secret}

# ===== 액추에이터/관측 (K8s 프로브 + Prometheus 스크레이프) =====
#  추가 배경: 멀티서비스 k8s 배포에서 liveness/readiness 프로브와 ServiceMonitor 스크레이프를 위해
#  user-service/admin-service 와 동일 규약으로 노출한다(probes 그룹 = /actuator/health/{liveness,readiness}).
#  /actuator/prometheus 는 micrometer-registry-prometheus(runtimeOnly)가 있어야 실제로 노출된다.
management:
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}     # 운영은 prod 프로파일에서 0.1 로 축소
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true                        # K8s liveness/readiness 프로브 그룹 생성
