# =====================================================================
# auth-server / prod : 운영 (모든 비밀/엔드포인트는 환경변수·시크릿으로 주입)
#   base application.yml 은 datasource 블록이 없다(로컬은 application-local* 오버레이에서 옴).
#   → 운영(K8s)에서는 이 프로파일이 PostgreSQL datasource 를 채운다. user-service prod 규약과 동일.
#   기본값을 두지 않아 미주입 시 기동 실패하게 만든다(설정 누락 조기 발견).
#   K8s: SPRING_PROFILES_ACTIVE=prod + ConfigMap(DB_URL/AUTH_SERVER_ISSUER 등) + Secret(DB_*/FRAMEWORK_JWT_SECRET/AES_SECRET).
#   ※ AS 는 Redis 를 쓰지 않는다(토큰스토어 memory, 서명키 회전 단일 실행은 jdbc 락). REDIS_* 불요.
# =====================================================================
spring:
  datasource:
    url: ${DB_URL}                 # 예) jdbc:postgresql://postgres:5432/authdb (기본값 없음 = 필수)
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: 3000
  flyway:
    baseline-on-migrate: false     # 운영은 baseline 후엔 끔
    clean-disabled: true           # 운영 DB 에서 flyway clean 금지(사고 방지)

management:
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:0.1}   # 운영은 샘플링 축소
  endpoint:
    health:
      show-details: never          # 운영은 health 상세 비노출

logging:
  level:
    root: info
    com.company.auth: info
