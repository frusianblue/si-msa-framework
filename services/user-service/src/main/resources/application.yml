server:
  port: 8080

spring:
  application:
    name: user-service
  # ===== Java 21 가상 스레드 활성화 (요청 처리 스레드 가상화) =====
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/sidb
    username: ${DB_USER:siuser}
    password: ${DB_PASSWORD:sipass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 기존 운영 DB 에 최초 도입 시
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.user.domain

# ===== 공통 프레임워크 보안(JWT) 설정 =====
framework:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-32-bytes!!}
      access-token-validity-seconds: 1800
      refresh-token-validity-seconds: 1209600
    token-store:
      type: memory   # memory | jdbc | redis
  openapi:
    title: "사용자 서비스 API"
    version: "v1"
  crypto:
    aes-secret: ${AES_SECRET:user-project-aes-secret-change-me}

  # ===== 파일 업로드 (기본 local; 환경별로 nas/s3 전환) =====
  file:
    enabled: true
    storage:
      type: local              # local | nas | s3
      base-path: ./uploads     # nas: /mnt/nas/uploads, s3: 무시
      max-size: 10485760       # 10MB
      # s3:                    # type=s3 일 때 (framework-file-s3 의존 추가 필요)
      #   bucket: my-bucket
      #   region: ap-northeast-2
      #   endpoint:            # MinIO 등 호환 스토리지

# ===== 관측성 / K8s 프로브 =====
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-}]"
  level:
    com.company.user.mapper: debug   # SQL 로깅
