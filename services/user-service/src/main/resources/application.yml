# =====================================================================
# user-service / 공통 설정 (모든 프로파일 공유)
# ---------------------------------------------------------------------
# 환경 구분은 3개로 통일한다: local | dev | prod
#   - local : 로컬 개발(기본). 외부 설치 0 = H2 메모리 DB. → application-local.yml
#   - dev   : 개발 서버(원격 인프라, 환경변수 주입).        → application-dev.yml
#   - prod  : 운영(시크릿 주입, 엄격).                      → application-prod.yml
#
# 특수/조합 환경은 local 위에 겹쳐 쓰는 "local-xx" 오버레이로 둔다:
#   - local-postgres : DB 를 H2 → 로컬 PostgreSQL 로 교체
#   - local-redis    : Redis 기능(캐시/토큰스토어/로그인시도) on
#   - local-noauth   : 로그인/권한 우회(과거 dev 프로파일이 하던 역할)
#
# 실행 예:
#   메모리 DB         : --spring.profiles.active=local
#   로컬 PostgreSQL   : --spring.profiles.active=local,local-postgres
#   PG + Redis        : --spring.profiles.active=local,local-postgres,local-redis
#   로그인 우회 추가  : --spring.profiles.active=local,local-noauth
# =====================================================================
server:
  port: 8080

spring:
  application:
    name: user-service
  # 기본 프로파일 = local (인자 없이 bootRun 하면 메모리 DB 로 뜬다). 컨테이너는 SPRING_PROFILES_ACTIVE 로 override.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  # ===== Java 21 가상 스레드 활성화 =====
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Flyway 공통: 운영 마이그레이션(db/migration)만. 로컬 시드는 local 프로파일에서 추가.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.user.domain

# ===== 공통 프레임워크 =====
framework:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-32-bytes!!}
      access-token-validity-seconds: 1800
      refresh-token-validity-seconds: 1209600
    token-store:
      type: ${TOKEN_STORE_TYPE:memory}   # memory | jdbc | redis (프로파일에서 override)
    # ===== 다운스트림 신뢰 자세(배치 환경별) — docs/TOKEN_VERIFICATION_GUIDE.md §7 =====
    #   K8s + NetworkPolicy(게이트웨이 우회 불가 보장): EDGE_TRUST_MODE=gateway-headers (Bearer 재검증 생략, 저렴)
    #   VM 등 네트워크 격리 약함: 기본 zero-trust (Bearer 로컬 재검증). local|dev|prod 와 직교하므로 env 로 주입.
    edge-trust:
      mode: ${EDGE_TRUST_MODE:zero-trust}   # zero-trust(안전 기본) | gateway-headers(의도적 완화)
    # ===== 리소스 서버: AS(OP) RS256/JWKS 토큰까지 zero-trust 재검증(기본 off) =====
    #   외부/그룹사 위임(AS) 토큰을 다운스트림이 직접 재검증할 때만 true. issuer 는 auth-server 와 동일해야 한다.
    resource-server:
      enabled: ${RESOURCE_SERVER_ENABLED:false}
      issuer: ${AUTH_SERVER_ISSUER:}
      jwks-uri: ${AUTH_SERVER_JWKS_URI:}        # 생략 시 {issuer}/oauth2/jwks
      roles-claim: roles
      audience: ${RESOURCE_SERVER_AUDIENCE:}    # 비면 aud 검증 생략
  openapi:
    title: "사용자 서비스 API"
    version: "v1"
  crypto:
    aes-secret: ${AES_SECRET:user-project-aes-secret-change-me}

  # ===== 감사/접속 로그 =====
  # enabled=true 로 항상 적재 동작. store.type 은 프로파일에서 결정한다.
  #   logging(기본·안전) | jdbc(DB 영속·조회 API) | kafka(messaging Outbox)
  # ⚠️ store.type=jdbc 로 쓰려면 (1) build.gradle 에 framework-audit 의존 추가,
  #    (2) audit_log 테이블(= db/migration/V4__audit_log.sql) 이 있어야 한다.
  audit:
    enabled: true
    method-audit: true
    login-audit: true
    store:
      type: ${AUDIT_STORE_TYPE:logging}

  # ===== 파일 업로드 =====
  file:
    enabled: true
    storage:
      type: ${FILE_STORAGE_TYPE:local}     # local | nas | s3
      base-path: ${FILE_BASE_PATH:./uploads}
      max-size: 10485760                   # 10MB

# ===== 관측성 / K8s 프로브 =====
management:
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-}]"
