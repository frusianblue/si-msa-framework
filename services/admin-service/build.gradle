// Flyway Gradle 플러그인이 PostgreSQL 과 통신하려면 '플러그인 클래스패스'에
// DB 모듈 + JDBC 드라이버가 있어야 한다. (앱 런타임 의존성과는 별개)
// 버전은 카탈로그의 flyway 버전과 맞춘다.
buildscript {
    repositories { mavenCentral() }
    dependencies {
        classpath 'org.flywaydb:flyway-database-postgresql:11.15.0'
        classpath 'org.postgresql:postgresql:42.7.4'
    }
}

plugins {
    id 'org.springframework.boot'      // 버전은 루트(카탈로그)에서 상속
    alias(libs.plugins.flyway)         // CI 마이그레이션: flywayValidate / flywayInfo / flywayMigrate
}

dependencies {
    // ===== 공통 프레임워크 =====
    implementation project(':framework:framework-core')
    implementation project(':framework:framework-mybatis')
    implementation project(':framework:framework-security')
    implementation project(':framework:framework-openapi')
    implementation project(':framework:framework-commoncode')
    implementation project(':framework:framework-file')
    // implementation project(':framework:framework-file-s3')   // S3 쓸 때 + storage.type=s3

    // 관측: Prometheus 스크레이프(/actuator/prometheus) — ServiceMonitor 수집 대상. 버전=Boot BOM.
    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'

    // ===== DB / 마이그레이션 =====
    implementation 'org.springframework.boot:spring-boot-starter-flyway'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'   // 버전은 Boot BOM 관리
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'com.h2database:h2'                         // 로컬/테스트용

    // ===== 개발 편의 =====
    // SQL 디버깅: 실제 바인딩 값 + 슬로우쿼리 로깅 (MyBatis 의 ? 자리표시자 해소)
    implementation libs.datasource.proxy.starter
    // 핫 리로드 (developmentOnly → 운영 jar 에는 미포함)
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // ===== 테스트 =====
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // 통합테스트: 운영과 동일한 PostgreSQL (버전은 Boot BOM 관리)
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:postgresql'
}

// ===== Flyway Gradle 플러그인 설정 (CI 배포 게이트용) =====
// 로컬 기본값 + CI 는 -Pflyway.url / -Pflyway.user / -Pflyway.password 로 주입.
// 운영 마이그레이션(db/migration)만 검증하고, 로컬 시드(db/seed-local)는 제외한다.
flyway {
    url      = project.findProperty('flyway.url')      ?: 'jdbc:postgresql://localhost:5432/sidb'
    user     = project.findProperty('flyway.user')     ?: 'siuser'
    password = project.findProperty('flyway.password') ?: 'sipass'
    locations = ['filesystem:src/main/resources/db/migration']
    baselineOnMigrate = true
}
