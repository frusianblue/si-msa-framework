server:
  port: 8081

spring:
  application:
    name: admin-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/sidb
    username: ${DB_USER:siuser}
    password: ${DB_PASSWORD:sipass}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.admin.domain

framework:
  security:
    jwt:
      # user-service 와 동일한 시크릿이어야 발급된 토큰을 검증할 수 있음(MSA 공유)
      secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-32-bytes!!}
      access-token-validity-seconds: 1800
  crypto:
    aes-secret: ${AES_SECRET:admin-project-aes-secret-change-me}
  openapi:
    title: "관리자 서비스 API"
    version: "v1"
    description: "권한/메뉴 관리 및 보안 캐시 갱신 API"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-}]"
