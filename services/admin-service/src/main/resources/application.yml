# =====================================================================
# admin-service / 공통 설정 (모든 프로파일 공유)
#   환경 구분: local | dev | prod  (+ local-postgres / local-redis / local-noauth 오버레이)
#   상세는 user-service 의 application.yml 주석 및 docs/LOCAL_SETUP.md 참고.
# =====================================================================
server:
  port: 8081

spring:
  application:
    name: admin-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.admin.domain

framework:
  security:
    jwt:
      # user-service 와 동일한 시크릿이어야 발급된 토큰을 검증할 수 있음(MSA 공유)
      secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-at-least-32-bytes!!}
      access-token-validity-seconds: 1800
    token-store:
      type: ${TOKEN_STORE_TYPE:memory}
  crypto:
    aes-secret: ${AES_SECRET:admin-project-aes-secret-change-me}
  openapi:
    title: "관리자 서비스 API"
    version: "v1"
    description: "권한/메뉴 관리 및 보안 캐시 갱신 API"
  audit:
    enabled: true
    method-audit: true
    login-audit: true
    store:
      type: ${AUDIT_STORE_TYPE:logging}

  # ===== 파일 업로드 =====
  #   admin 도 framework-file 의존 → 기본 type=local 저장소(FileSystemFileStorage)가 기동 시
  #   base-path 에 디렉터리를 생성한다(생성자 createDirectories). read-only 루트FS(deployment-hardening)
  #   에서는 기본 base-path(./uploads = /application/uploads)에 쓸 수 없어 localFileStorage 빈 생성이
  #   실패하고, 이어 fileService 의존성 미충족으로 ApplicationContext 기동이 깨진다.
  #   → 환경변수 FRAMEWORK_FILE_STORAGE_BASE_PATH 를 "명시 placeholder"로 받아 쓰기 가능 경로
  #     (/tmp/uploads = hardening 의 tmp emptyDir)로 덮는다. 명시 placeholder 는 환경변수명을 그대로
  #     매칭하므로 relaxed binding 의 kebab-case 모호성(base-path → BASEPATH vs BASE_PATH)을 회피한다.
  file:
    enabled: true
    storage:
      type: ${FILE_STORAGE_TYPE:local}                          # local | nas | s3 (admin 은 configmap 미지정 = local)
      base-path: ${FRAMEWORK_FILE_STORAGE_BASE_PATH:./uploads}   # 매니페스트 env 명과 정확히 일치
      max-size: 10485760                                         # 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-}]"
