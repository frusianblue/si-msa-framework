server:
  port: 8000

spring:
  application:
    name: gateway
  # RequestRateLimiter(Redis 토큰버킷)용 리액티브 Redis. K8s 에서는 REDIS_HOST 를 redis 서비스명으로 주입.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          # 게이트웨이가 모든 요청에 X-Trace-Id 를 붙여 하위 서비스로 전달
          default-filters:
            - AddRequestHeader=X-Gateway, si-msa-gateway
          # CORS 는 브라우저 진입점(게이트웨이)에서 한 곳으로 처리. 다운스트림 서비스에는 중복 설정하지 말 것.
          globalcors:
            add-to-simple-url-handler-mapping: true   # preflight(OPTIONS)가 라우트 predicate 에 안 걸려도 처리
            cors-configurations:
              '[/**]':
                # allowCredentials=true 이면 allowedOrigins 에 "*" 금지 → allowedOriginPatterns 사용
                allowedOriginPatterns:
                  - "https://*.yourdomain.com"
                allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: user-service
              uri: lb://user-service          # K8s 환경에서는 http://user-service:8080 로 대체 가능
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userCb
                    fallbackUri: forward:/fallback/user
                # 전역 레이트리밋(토큰버킷). replenishRate=초당 허용, burstCapacity=순간 버스트, 초과 시 429.
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@principalKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
          # 신뢰 프록시 (X-Forwarded-* 사용 시 필요. 2025.x 부터 기본 비활성)
          trusted-proxies: "10\\..*|172\\..*|192\\.168\\..*"

# 관측성: 100% 추적 (운영에서는 0.1 등으로 조정)
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # K8s liveness/readiness 프로브용

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

# 엣지 인증: 게이트웨이에서 JWT 1차 검증 후 신뢰 헤더(X-User-Id/X-User-Roles)를 다운스트림에 주입.
#   jwt-secret 은 framework.security.jwt.secret 과 "동일한" 값이어야 한다(같은 키로 서명한 토큰 검증).
#   기본 off(점진 도입). 운영에서는 GATEWAY_AUTH_ENABLED=true + JWT_SECRET 주입.
gateway:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:false}
    jwt-secret: ${JWT_SECRET:}
    token-type: access
    blacklist-check:
      enabled: ${GATEWAY_BLACKLIST_CHECK_ENABLED:false}  # 중앙 로그아웃(SSO). true 면 reactive Redis 필요.
    permit-all-patterns:
      - /api/*/auth/**
      - /actuator/**
      - /fallback/**
